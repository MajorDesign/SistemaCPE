<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Global Styles -->
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/global.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/layout.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/components.css">
  
  <!-- Page Specific - CAMINHO CORRIGIDO -->
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/tickets.css">
 
  <title>Tickets - CPE Control</title>
</head>

<body>
  <!-- ============================================================ -->
  <!-- NAVBAR - Carregada pelo nav.js -->
  <!-- ============================================================ -->
  <nav id="navbar-container"></nav>

  <!-- ============================================================ -->
  <!-- CONTAINER PRINCIPAL -->
  <!-- ============================================================ -->
  <div class="container-main">
    <!-- SIDEBAR - Carregada pelo nav.js -->
    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <!-- TOP BAR -->
      <div class="top-bar">
        <button class="menu-toggle" id="menuToggle">
          <i class="bi bi-list"></i>
        </button>
        <h1><i class="bi bi-ticket"></i> Tickets</h1>
      </div>

      <!-- CONTENT -->
      <div class="content">
        <!-- Alerts -->
        <div class="alert alert-danger d-none" id="alertBox" role="alert">
          <i class="bi bi-exclamation-circle"></i>
          <span id="alertMessage"></span>
        </div>

        <div class="alert alert-success d-none" id="successBox" role="alert">
          <i class="bi bi-check-circle"></i>
          <span id="successMessage">Operação realizada com sucesso!</span>
        </div>

        <!-- Page Header -->
        <div class="page-header">
          <h2 class="page-title">
            <i class="bi bi-ticket-detailed"></i> Gerenciamento de Tickets
          </h2>
          <button class="btn-new-ticket" onclick="openNewTicketModal()">
            <i class="bi bi-plus-lg"></i> Novo Ticket
          </button>
        </div>

        <!-- Statistics -->
        <div class="stats-grid">
          <div class="stat-card">
            <div class="stat-label">Total de Tickets</div>
            <div class="stat-value" id="totalTickets">0</div>
            <div class="stat-change">Tickets criados</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Abertos</div>
            <div class="stat-value" id="openTickets">0</div>
            <div class="stat-change">Aguardando atendimento</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Em Andamento</div>
            <div class="stat-value" id="inProgressTickets">0</div>
            <div class="stat-change">Sendo resolvidos</div>
          </div>

          <div class="stat-card">
            <div class="stat-label">Resolvidos</div>
            <div class="stat-value" id="resolvedTickets">0</div>
            <div class="stat-change">Problemas solucionados</div>
          </div>
        </div>

        <!-- Search and Filters -->
        <div class="search-filter">
          <input type="text" id="searchInput" placeholder="Buscar tickets...">
          <select id="statusFilter">
            <option value="">Todos os Status</option>
            <option value="open">Abertos</option>
            <option value="in-progress">Em Andamento</option>
            <option value="resolved">Resolvidos</option>
            <option value="closed">Fechados</option>
          </select>
          <select id="priorityFilter">
            <option value="">Todas as Prioridades</option>
            <option value="low">Baixa</option>
            <option value="medium">Média</option>
            <option value="high">Alta</option>
            <option value="urgent">Urgente</option>
          </select>
        </div>

        <!-- Tickets Table -->
        <div class="tickets-table">
          <table id="ticketsTable">
            <thead>
              <tr>
                <th>ID</th>
                <th>Título</th>
                <th>Cliente</th>
                <th>Prioridade</th>
                <th>Status</th>
                <th>Criado em</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="ticketsBody">
              <tr>
                <td colspan="7" style="text-align: center; padding: 2rem;">
                  <div class="empty-state">
                    <div class="empty-state-icon">
                      <i class="bi bi-inbox"></i>
                    </div>
                    <p>Carregando tickets...</p>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MODAL - NOVO/EDITAR TICKET -->
  <!-- ============================================================ -->
  <div class="modal fade" id="ticketModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="ticketModalLabel">
            <i class="bi bi-plus-square"></i> Novo Ticket
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          <div class="alert alert-danger d-none" id="modalAlertBox" role="alert">
            <i class="bi bi-exclamation-circle"></i>
            <span id="modalAlertMessage"></span>
          </div>

          <form id="ticketForm" novalidate>
            <div class="mb-3">
              <label for="ticketTitle" class="form-label">
                <i class="bi bi-input-cursor"></i> Título <span style="color: #ef4444;">*</span>
              </label>
              <input type="text" class="form-control" id="ticketTitle"
                placeholder="Ex: Problema com login na plataforma" required />
            </div>

            <div class="mb-3">
              <label for="ticketDescription" class="form-label">
                <i class="bi bi-file-text"></i> Descrição
              </label>
              <textarea class="form-control" id="ticketDescription" rows="4"
                placeholder="Descreva o problema em detalhes..."></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="ticketClient" class="form-label">
                  <i class="bi bi-person"></i> Cliente <span style="color: #ef4444;">*</span>
                </label>
                <input type="text" class="form-control" id="ticketClient"
                  placeholder="Nome do cliente" required />
              </div>

              <div class="col-md-6 mb-3">
                <label for="ticketEmail" class="form-label">
                  <i class="bi bi-envelope"></i> E-mail <span style="color: #ef4444;">*</span>
                </label>
                <input type="email" class="form-control" id="ticketEmail"
                  placeholder="email@cliente.com" required />
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="ticketPriority" class="form-label">
                  <i class="bi bi-exclamation-lg"></i> Prioridade <span style="color: #ef4444;">*</span>
                </label>
                <select class="form-select" id="ticketPriority" required>
                  <option value="">Selecione a prioridade...</option>
                  <option value="low">Baixa</option>
                  <option value="medium">Média</option>
                  <option value="high">Alta</option>
                  <option value="urgent">Urgente</option>
                </select>
              </div>

              <div class="col-md-6 mb-3">
                <label for="ticketAssignee" class="form-label">
                  <i class="bi bi-person-check"></i> Atribuído a
                </label>
                <select class="form-select" id="ticketAssignee">
                  <option value="">Não atribuído</option>
                  <option value="me">Mim</option>
                  <option value="user1">João Silva</option>
                  <option value="user2">Maria Santos</option>
                  <option value="user3">Carlos Oliveira</option>
                </select>
              </div>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1" id="submitBtn">
                <i class="bi bi-check-lg"></i> Criar Ticket
              </button>
              <button type="button" class="btn btn-secondary flex-grow-1" data-bs-dismiss="modal">
                <i class="bi bi-x-lg"></i> Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- SCRIPTS - CAMINHOS CORRIGIDOS -->
  <script src="/SistemaCPE/web/assests/js/nav.js"></script>

  <script>
    console.log("\n" + "=".repeat(80));
    console.log("[TICKETS/PAGE] 📄 Inicializando página de Tickets");
    console.log("[TICKETS/PAGE] ℹ️  Modo: SEM AUTENTICAÇÃO - Acesso Público e Direto");
    console.log("[TICKETS/PAGE] ✅ Nenhuma verificação de permissão");
    console.log("=".repeat(80) + "\n");

    document.addEventListener("DOMContentLoaded", () => {
      console.log("[TICKETS/INIT] 📋 DOM Carregado com sucesso");
      console.log("[TICKETS/INIT] ⏱️  Timestamp:", new Date().toLocaleString('pt-BR'));
      console.log("[TICKETS/INIT] 🌐 URL:", window.location.href);

      try {
        // Aguardar nav.js carregar
        setTimeout(() => {
          loadTickets();
          setupEventListeners();
          setActiveMenu();
          console.log("[TICKETS/INIT] ✅ Página pronta para uso");
          console.log("=".repeat(80) + "\n");
        }, 500);
      } catch (err) {
        console.error("[TICKETS/INIT] ❌ ERRO:", err.message);
        showError("Erro ao inicializar página: " + err.message);
      }
    });

    function setActiveMenu() {
      // Marcar menu de tickets como ativo
      const ticketsLink = document.querySelector('a[href*="tickets.html"]');
      if (ticketsLink) {
        ticketsLink.parentElement.classList.add('active');
        ticketsLink.classList.add('active');
      }
    }

    function setupEventListeners() {
      console.log("[TICKETS/SETUP] 🔧 Configurando event listeners...");

      const menuToggle = document.getElementById("menuToggle");
      const sidebar = document.getElementById("sidebar-container");
      
      if (menuToggle && sidebar) {
        menuToggle.addEventListener("click", () => {
          const sidebarEl = sidebar.querySelector(".sidebar");
          if (sidebarEl) {
            sidebarEl.classList.toggle("show");
          }
        });
      }

      document.querySelectorAll(".sidebar-menu-link").forEach(link => {
        link.addEventListener("click", () => {
          const sidebarEl = sidebar?.querySelector(".sidebar");
          if (sidebarEl) {
            sidebarEl.classList.remove("show");
          }
        });
      });

      document.getElementById("searchInput")?.addEventListener("input", () => {
        renderTickets(filterTickets());
      });

      document.getElementById("statusFilter")?.addEventListener("change", () => {
        renderTickets(filterTickets());
      });

      document.getElementById("priorityFilter")?.addEventListener("change", () => {
        renderTickets(filterTickets());
      });

      document.getElementById("ticketForm")?.addEventListener("submit", handleFormSubmit);

      document.getElementById("ticketModal")?.addEventListener("show.bs.modal", resetModal);
      document.getElementById("ticketModal")?.addEventListener("hidden.bs.modal", () => {
        selectedTicketId = null;
      });

      console.log("[TICKETS/SETUP] ✅ Event listeners configurados");
    }
  </script>

  <script>
    let tickets = [];
    let selectedTicketId = null;

    async function loadTickets() {

          {

          }
        ];

        console.log("[TICKETS/LOAD] ├─ Em progresso:", tickets.filter(t => t.status === 'in-progress').length);

    function filterTickets() {
      let filtered = [...tickets];

      const statusFilter = document.getElementById("statusFilter")?.value || "";
      if (statusFilter) {
        filtered = filtered.filter(t => t.status === statusFilter);
      }

      const priorityFilter = document.getElementById("priorityFilter")?.value || "";
      if (priorityFilter) {
        filtered = filtered.filter(t => t.priority === priorityFilter);
      }

      const searchTerm = document.getElementById("searchInput")?.value?.toLowerCase() || "";
      if (searchTerm) {
        filtered = filtered.filter(t =>
          t.title.toLowerCase().includes(searchTerm) ||
          t.description.toLowerCase().includes(searchTerm) ||
          t.client.toLowerCase().includes(searchTerm) ||
          t.id.toString().includes(searchTerm)
        );
      }

      return filtered;
    }

    function renderTickets(list = tickets) {
      const ticketsBody = document.getElementById("ticketsBody");

      if (!list || list.length === 0) {
        ticketsBody.innerHTML = `
          <tr>
            <td colspan="7">
              <div class="empty-state">
                <div class="empty-state-icon"><i class="bi bi-inbox"></i></div>
                <p>Nenhum ticket encontrado</p>
                <p style="font-size: 12px; margin-top: 1rem; color: #9ca3af;">
                  Clique em "Novo Ticket" para criar um ou ajuste os filtros
                </p>
              </div>
            </td>
          </tr>
        `;
        return;
      }

      ticketsBody.innerHTML = list.map(ticket => `
        <tr>
          <td><span class="ticket-id">#${ticket.id}</span></td>
          <td><span class="ticket-title" title="${escapeHtml(ticket.title)}">${escapeHtml(ticket.title)}</span></td>
          <td>${escapeHtml(ticket.client)}</td>
          <td>
            <span class="priority-badge priority-${ticket.priority}">
              ${getPriorityLabel(ticket.priority)}
            </span>
          </td>
          <td>
            <span class="status-badge status-${ticket.status.replace('-', '-')}">
              ${getStatusLabel(ticket.status)}
            </span>
          </td>
          <td>${ticket.createdAt}</td>
          <td>
            <div style="display: flex; gap: 6px;">
              <button class="btn-ticket-action" onclick="viewTicket(${ticket.id})" title="Ver detalhes">
                <i class="bi bi-eye"></i> Ver
              </button>
              <button class="btn-ticket-action" onclick="editTicket(${ticket.id})" title="Editar">
                <i class="bi bi-pencil"></i> Editar
              </button>
              <button class="btn-ticket-action danger" onclick="deleteTicket(${ticket.id}, '${escapeHtml(ticket.title)}')" title="Deletar">
                <i class="bi bi-trash"></i> Deletar
              </button>
            </div>
          </td>
        </tr>
      `).join("");
    }

    function getStatusLabel(status) {
      const labels = {
        "open": "Aberto",
        "in-progress": "Em Andamento",
        "resolved": "Resolvido",
        "closed": "Fechado",
        "pending": "Pendente"
      };
      return labels[status] || status;
    }

    function getPriorityLabel(priority) {
      const labels = {
        low: "Baixa",
        medium: "Média",
        high: "Alta",
        urgent: "Urgente"
      };
      return labels[priority] || priority;
    }

    function escapeHtml(text) {
      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };
      return text.replace(/[&<>"']/g, char => map[char]);
    }

    function updateStatistics() {
      const total = tickets.length;
      const open = tickets.filter(t => t.status === "open").length;
      const inProgress = tickets.filter(t => t.status === "in-progress").length;
      const resolved = tickets.filter(t => t.status === "resolved").length;

      document.getElementById("totalTickets").textContent = total;
      document.getElementById("openTickets").textContent = open;
      document.getElementById("inProgressTickets").textContent = inProgress;
      document.getElementById("resolvedTickets").textContent = resolved;
    }

    function viewTicket(ticketId) {
      const ticket = tickets.find(t => t.id === ticketId);
      if (!ticket) return;

      console.log("[TICKETS/VIEW] 👁️ Visualizando ticket:", ticketId, "-", ticket.title);
      showSuccess(`Abrindo detalhes do ticket #${ticket.id}`);
    }

    function editTicket(ticketId) {
      const ticket = tickets.find(t => t.id === ticketId);
      if (!ticket) return;

      console.log("[TICKETS/EDIT] ✏️ Editando ticket:", ticketId, "-", ticket.title);

      selectedTicketId = ticketId;
      document.getElementById("ticketModalLabel").innerHTML = '<i class="bi bi-pencil-square"></i> Editar Ticket #' + ticket.id;
      document.getElementById("ticketTitle").value = ticket.title;
      document.getElementById("ticketDescription").value = ticket.description;
      document.getElementById("ticketClient").value = ticket.client;
      document.getElementById("ticketEmail").value = ticket.email;
      document.getElementById("ticketPriority").value = ticket.priority;
      document.getElementById("ticketAssignee").value = ticket.assignee || "";
      document.getElementById("submitBtn").innerHTML = '<i class="bi bi-check-lg"></i> Atualizar Ticket';

      const modal = new bootstrap.Modal(document.getElementById("ticketModal"));
      modal.show();
    }

    function deleteTicket(ticketId, ticketTitle) {
      console.log("[TICKETS/DELETE] 🗑️ Deletando ticket:", ticketId, "-", ticketTitle);

      if (!confirm(`Tem certeza que deseja deletar o ticket "${ticketTitle}"?`)) {
        console.log("[TICKETS/DELETE] ⏭️ Deleção cancelada pelo usuário");
        return;
      }

      try {
        const index = tickets.findIndex(t => t.id === ticketId);
        if (index !== -1) {
          tickets.splice(index, 1);
          console.log("[TICKETS/DELETE] ✓ Ticket deletado com sucesso");
          showSuccess(`Ticket "${ticketTitle}" deletado com sucesso!`);
          renderTickets(filterTickets());
          updateStatistics();
        }

      } catch (err) {
        console.error("[TICKETS/DELETE] ❌ Erro:", err.message);
        showError("Erro ao deletar ticket: " + err.message);
      }
    }

    function openNewTicketModal() {
      selectedTicketId = null;
      const modal = new bootstrap.Modal(document.getElementById("ticketModal"));
      modal.show();
    }

    function resetModal() {
      if (!selectedTicketId) {
        document.getElementById("ticketModalLabel").innerHTML = '<i class="bi bi-plus-square"></i> Novo Ticket';
        document.getElementById("ticketForm").reset();
        document.getElementById("submitBtn").innerHTML = '<i class="bi bi-check-lg"></i> Criar Ticket';
      }
      document.getElementById("modalAlertBox").classList.add("d-none");
    }

    async function handleFormSubmit(e) {
      e.preventDefault();

      const title = document.getElementById("ticketTitle")?.value?.trim();
      const description = document.getElementById("ticketDescription")?.value?.trim();
      const client = document.getElementById("ticketClient")?.value?.trim();
      const email = document.getElementById("ticketEmail")?.value?.trim();
      const priority = document.getElementById("ticketPriority")?.value;
      const assignee = document.getElementById("ticketAssignee")?.value || null;

      if (!title || !client || !email || !priority) {
        console.warn("[TICKETS/FORM] ⚠️ Campos obrigatórios não preenchidos");
        showModalError("Preencha todos os campos obrigatórios: Título, Cliente, E-mail e Prioridade");
        return;
      }

      try {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;

        const now = new Date();
        const timestamp = now.toLocaleString('pt-BR').replace(',', '');

        if (selectedTicketId) {
          const ticket = tickets.find(t => t.id === selectedTicketId);
          if (ticket) {
            ticket.title = title;
            ticket.description = description;
            ticket.client = client;
            ticket.email = email;
            ticket.priority = priority;
            ticket.assignee = assignee;
            ticket.updatedAt = timestamp;

            console.log("[TICKETS/FORM] ✓ Ticket atualizado");
            showSuccess("Ticket atualizado com sucesso!");
          }
        } else {
          const newTicket = {
            id: Math.max(...tickets.map(t => t.id), 0) + 1,
            title,
            description,
            client,
            email,
            priority,
            status: "open",
            assignee,
            createdAt: timestamp,
            updatedAt: timestamp
          };

          tickets.push(newTicket);

          console.log("[TICKETS/FORM] ✓ Novo ticket criado");
          showSuccess("Ticket criado com sucesso!");
        }

        document.getElementById("ticketForm").reset();
        const modal = bootstrap.Modal.getInstance(document.getElementById("ticketModal"));
        if (modal) modal.hide();

        selectedTicketId = null;
        renderTickets(filterTickets());
        updateStatistics();

      } catch (err) {
        console.error("[TICKETS/FORM] ❌ Erro:", err.message);
        showModalError(err.message || "Erro ao processar ticket!");
      } finally {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Criar Ticket';
      }
    }

    function showError(message) {
      console.log(`[TICKETS/ALERT] ❌ Erro: ${message}`);

      const alertBox = document.getElementById("alertBox");
      const alertMessage = document.getElementById("alertMessage");
      if (alertBox && alertMessage) {
        alertMessage.textContent = message;
        alertBox.classList.remove("d-none");
        setTimeout(() => {
          alertBox.classList.add("d-none");
        }, 5000);
      }
    }

    function showSuccess(message) {
      console.log(`[TICKETS/ALERT] ✅ Sucesso: ${message}`);

      const successBox = document.getElementById("successBox");
      const successMessage = document.getElementById("successMessage");
      if (successBox && successMessage) {
        successMessage.textContent = message;
        successBox.classList.remove("d-none");
        setTimeout(() => {
          successBox.classList.add("d-none");
        }, 5000);
      }
    }

    function showModalError(message) {
      console.log(`[TICKETS/MODAL/ERROR] ⚠️ ${message}`);

      const modalAlert = document.getElementById("modalAlertBox");
      const modalAlertMsg = document.getElementById("modalAlertMessage");
      if (modalAlert && modalAlertMsg) {
        modalAlertMsg.textContent = message;
        modalAlert.classList.remove("d-none");
      }
    }

    console.log("[TICKETS] ✅ Script carregado e pronto para uso\n");
  </script>

</body>

</html>
