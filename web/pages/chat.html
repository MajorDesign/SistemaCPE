<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat - CPE Control</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/style.css">

  <style>
    .chat-container {
      display: flex;
      height: calc(100vh - 120px);
      background: white;
      gap: 0;
    }

    .chat-list {
      width: 300px;
      border-right: 1px solid #e5e7eb;
      overflow-y: auto;
      background: white;
    }

    .chat-item {
      padding: 16px;
      border-bottom: 1px solid #f3f4f6;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-item:hover {
      background-color: #f9fafb;
    }

    .chat-item.active {
      background-color: #667eea;
      color: white;
    }

    .chat-item-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
      flex-shrink: 0;
    }

    .chat-item.active .chat-item-avatar {
      background: rgba(255, 255, 255, 0.2);
    }

    .chat-item-content {
      flex: 1;
      min-width: 0;
    }

    .chat-item-name {
      font-weight: 600;
      margin-bottom: 4px;
      font-size: 14px;
    }

    .chat-item-message {
      font-size: 13px;
      opacity: 0.7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chat-item-status {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #10b981;
      flex-shrink: 0;
    }

    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .chat-header {
      padding: 16px 20px;
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #f9fafb;
    }

    .chat-header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .chat-header-info h3 {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
    }

    .chat-header-info p {
      margin: 4px 0 0 0;
      font-size: 12px;
      color: #6b7280;
    }

    .online-indicator {
      color: #10b981;
      margin-right: 4px;
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #fafbfc;
    }

    .message {
      display: flex;
      margin-bottom: 8px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.own {
      justify-content: flex-end;
    }

    .message-bubble {
      max-width: 60%;
      padding: 10px 16px;
      border-radius: 8px;
      word-wrap: break-word;
      font-size: 14px;
      line-height: 1.4;
    }

    .message.own .message-bubble {
      background-color: #667eea;
      color: white;
      border-bottom-right-radius: 4px;
    }

    .message.other .message-bubble {
      background-color: white;
      color: #1f2937;
      border: 1px solid #e5e7eb;
      border-bottom-left-radius: 4px;
    }

    .message-time {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 4px;
      text-align: center;
      padding: 0 20px;
    }

    .chat-input-area {
      padding: 16px 20px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      gap: 10px;
      background: white;
    }

    .chat-input-area .form-control {
      flex: 1;
      border-radius: 8px;
      border: 1px solid #e5e7eb;
      padding: 0.75rem 1rem;
      font-size: 14px;
    }

    .chat-input-area .form-control:focus {
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      outline: none;
    }

    .chat-input-area .btn {
      border-radius: 8px;
      min-width: 100px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      font-weight: 600;
    }

    .chat-input-area .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: #6b7280;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
    }

    .empty-state-icon {
      font-size: 3rem;
      color: #d1d5db;
      margin-bottom: 1rem;
    }

    .alert {
      border: none;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .alert-danger {
      background-color: rgba(220, 38, 38, 0.1);
      color: #991b1b;
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #065f46;
    }

    .d-none {
      display: none;
    }

    @media (max-width: 768px) {
      .chat-list {
        width: 100%;
        height: auto;
        max-height: 200px;
        display: flex;
        overflow-x: auto;
        border-right: none;
        border-bottom: 1px solid #e5e7eb;
      }

      .chat-item {
        flex-direction: column;
        width: 120px;
        flex-shrink: 0;
        text-align: center;
        padding: 12px;
      }

      .chat-item-avatar {
        margin: 0 auto;
      }

      .message-bubble {
        max-width: 80%;
      }
    }
  </style>
</head>

<body>
  <!-- ============================================================ -->
  <!-- 🔒 LOADING PAGE -->
  <!-- ============================================================ -->
  <div id="loadingPage"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 9999;">
    <div style="text-align: center; color: white;">
      <div class="spinner-border" role="status"
        style="width: 3rem; height: 3rem; border: 0.3em solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white;">
        <span class="visually-hidden">Carregando...</span>
      </div>
      <p style="margin-top: 1rem;">Inicializando página...</p>
    </div>
  </div>
  <!-- ============================================================ -->

  <div class="container-main" style="display: none;">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">CPE</div>
        <div class="sidebar-title">CONTROL</div>
      </div>

      <div class="search-box">
        <input type="text" placeholder="Buscar">
      </div>

      <ul class="sidebar-menu"></ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="top-bar">
        <button class="menu-toggle">☰</button>
        <h1><i class="bi bi-chat-dots"></i> Chat</h1>
      </div>

      <div class="content" style="padding: 0;">
        <!-- ALERTS -->
        <div class="alert alert-danger d-none" id="alertBox" role="alert" style="margin: 0;">
          <i class="bi bi-exclamation-circle"></i>
          <span id="alertMessage"></span>
        </div>

        <div class="alert alert-success d-none" id="successBox" role="alert" style="margin: 0;">
          <i class="bi bi-check-circle"></i>
          <span id="successMessage">Mensagem enviada com sucesso!</span>
        </div>

        <div class="chat-container">
          <!-- LISTA DE CHATS -->
          <div class="chat-list" id="chatList">
            <div class="empty-state" style="height: auto; padding: 2rem 1rem;">
              <div class="empty-state-icon"><i class="bi bi-inbox"></i></div>
              <p>Carregando chats...</p>
            </div>
          </div>

          <!-- ÁREA DE CHAT -->
          <div class="chat-area" id="chatArea">
            <div class="empty-state">
              <div class="empty-state-icon"><i class="bi bi-chat-dots"></i></div>
              <p>Selecione uma conversa para começar</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📦 SCRIPTS -->
  <!-- ============================================================ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/SistemaCPE/web/assests/js/api.js"></script>
  <script src="/SistemaCPE/web/assests/js/config.js"></script>
  <script src="/SistemaCPE/web/assests/js/nav.js"></script>

  <!-- ============================================================ -->
  <!-- 🔧 INICIALIZAÇÃO DA PÁGINA -->
  <!-- ============================================================ -->
  <script>
    console.log("\n" + "=".repeat(80));
    console.log("[CHAT/PAGE] 📄 Inicializando página de Chat");
    console.log("[CHAT/PAGE] ℹ️  Modo: SEM AUTENTICAÇÃO - Acesso público");
    console.log("=".repeat(80) + "\n");

    document.addEventListener("DOMContentLoaded", async () => {
      console.log("[CHAT/INIT] 📋 DOM Carregado");

      try {
        // ===== Mostrar Conteúdo =====
        const loadingPage = document.getElementById("loadingPage");
        const containerMain = document.querySelector(".container-main");
        
        loadingPage.style.display = "none";
        containerMain.style.display = "flex";
        
        console.log("[CHAT/INIT] ✅ Página inicializada com sucesso");
        console.log("=".repeat(80) + "\n");

        // ===== Carregar Chats =====
        await loadChats();

      } catch (err) {
        console.error("[CHAT/INIT] ❌ ERRO NA INICIALIZAÇÃO");
        console.error("[CHAT/INIT] 📍 Mensagem:", err.message);
        console.error("[CHAT/INIT] 🔗 Stack:", err.stack);
        console.error("=".repeat(80) + "\n");
        
        showError("Erro ao inicializar página: " + err.message);
      }
    });
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÕES DA PÁGINA -->
  <!-- ============================================================ -->
  <script>
    let chats = [];
    let selectedChatId = null;

    /**
     * ✅ Carrega os chats
     */
    async function loadChats() {
      console.log("\n[CHAT/LOAD] 📥 Carregando chats...");

      try {
        // Simular dados de API - substitua pela chamada real
        chats = [
          {
            id: 1,
            name: "João Silva",
            avatar: "JS",
            lastMessage: "Obrigado pela ajuda!",
            lastTime: "14:30",
            online: true,
            messages: [
              { id: 1, sender: "other", text: "Olá, tenho uma dúvida sobre a plataforma", time: "14:20" },
              { id: 2, sender: "own", text: "Claro! Como posso ajudar?", time: "14:21" },
              { id: 3, sender: "other", text: "Como faço para exportar meus dados em CSV?", time: "14:22" },
              { id: 4, sender: "own", text: "Você pode fazer isso em Configurações > Exportar Dados. Lá você encontra a opção de CSV.", time: "14:23" },
              { id: 5, sender: "other", text: "Obrigado pela ajuda!", time: "14:30" }
            ]
          },
          {
            id: 2,
            name: "Maria Santos",
            avatar: "MS",
            lastMessage: "Vou verificar isso para você",
            lastTime: "13:45",
            online: true,
            messages: []
          },
          {
            id: 3,
            name: "Equipe de Desenvolvimento",
            avatar: "ED",
            lastMessage: "A feature foi deployada com sucesso",
            lastTime: "12:15",
            online: false,
            messages: []
          },
          {
            id: 4,
            name: "Pedro Costa",
            avatar: "PC",
            lastMessage: "Quando vocês podem atender?",
            lastTime: "11:30",
            online: true,
            messages: []
          }
        ];

        console.log("[CHAT/LOAD] ✓", chats.length, "chats carregados");
        renderChatList();

        // Seleciona o primeiro chat por padrão
        if (chats.length > 0) {
          selectChat(chats[0].id);
        }

        console.log("[CHAT/LOAD] ✅ Chats renderizados\n");

      } catch (err) {
        console.error("[CHAT/LOAD] ✗ Erro:", err.message);
        showError("Erro ao carregar chats: " + err.message);
      }
    }

    /**
     * ✅ Renderiza a lista de chats
     */
    function renderChatList() {
      console.log("[CHAT/RENDER] 🎨 Renderizando lista de chats");
      const chatList = document.getElementById("chatList");

      if (!chats || chats.length === 0) {
        chatList.innerHTML = `
          <div class="empty-state" style="height: auto; padding: 2rem 1rem;">
            <div class="empty-state-icon"><i class="bi bi-inbox"></i></div>
            <p>Nenhum chat disponível</p>
          </div>
        `;
        return;
      }

      chatList.innerHTML = chats.map(chat => `
        <div class="chat-item ${selectedChatId === chat.id ? 'active' : ''}" onclick="selectChat(${chat.id})">
          <div class="chat-item-avatar">${chat.avatar}</div>
          <div class="chat-item-content">
            <div class="chat-item-name">${chat.name}</div>
            <div class="chat-item-message">${chat.lastMessage}</div>
          </div>
          ${chat.online ? '<div class="chat-item-status"></div>' : ''}
        </div>
      `).join("");
    }

    /**
     * ✅ Seleciona um chat
     */
    function selectChat(chatId) {
      console.log("[CHAT/SELECT] 🎯 Selecionando chat:", chatId);
      selectedChatId = chatId;
      const chat = chats.find(c => c.id === chatId);

      if (!chat) {
        console.error("[CHAT/SELECT] ✗ Chat não encontrado");
        return;
      }

      renderChatList();
      renderChatArea(chat);
    }

    /**
     * ✅ Renderiza a área de chat
     */
    function renderChatArea(chat) {
      console.log("[CHAT/AREA] 📝 Renderizando área de chat para:", chat.name);
      const chatArea = document.getElementById("chatArea");

      chatArea.innerHTML = `
        <div class="chat-header">
          <div class="chat-header-left">
            <div class="chat-item-avatar" style="width: 40px; height: 40px; font-size: 12px;">${chat.avatar}</div>
            <div class="chat-header-info">
              <h3>${chat.name}</h3>
              <p><span class="online-indicator">●</span> ${chat.online ? 'Online' : 'Offline'}</p>
            </div>
          </div>
          <button class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-info-circle"></i>
          </button>
        </div>

        <div class="chat-messages" id="chatMessages">
          ${chat.messages.length === 0 ? 
            '<div class="empty-state"><p>Nenhuma mensagem ainda. Inicie a conversa!</p></div>' :
            chat.messages.map(msg => `
              <div class="message ${msg.sender}">
                <div class="message-bubble">${msg.text}</div>
              </div>
            `).join('')
          }
        </div>

        <div class="chat-input-area">
          <input type="text" class="form-control" id="messageInput" placeholder="Digite sua mensagem..." 
            onkeypress="handleKeyPress(event, ${chat.id})">
          <button class="btn btn-primary" onclick="sendMessage(${chat.id})">
            <i class="bi bi-send"></i> Enviar
          </button>
        </div>
      `;

      // Auto scroll para o final
      setTimeout(() => {
        const chatMessages = document.getElementById("chatMessages");
        if (chatMessages) {
          chatMessages.scrollTop = chatMessages.scrollHeight;
        }
      }, 100);

      // Focus no input
      document.getElementById("messageInput")?.focus();
    }

    /**
     * ✅ Envia uma mensagem
     */
    async function sendMessage(chatId) {
      const input = document.getElementById("messageInput");
      const text = input?.value?.trim();

      if (!text) {
        console.warn("[CHAT/SEND] ⚠️ Mensagem vazia");
        showError("Escreva uma mensagem!");
        return;
      }

      try {
        console.log("[CHAT/SEND] ➡️ Enviando mensagem para chat:", chatId);

        const chat = chats.find(c => c.id === chatId);
        if (!chat) {
          throw new Error("Chat não encontrado");
        }

        // Adiciona a mensagem à conversa
        const newMessage = {
          id: (chat.messages.length || 0) + 1,
          sender: "own",
          text: text,
          time: new Date().toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })
        };

        chat.messages.push(newMessage);
        input.value = "";

        console.log("[CHAT/SEND] ✓ Mensagem adicionada com sucesso");

        renderChatArea(chat);
        showSuccess("Mensagem enviada!");

      } catch (err) {
        console.error("[CHAT/SEND] ✗ Erro:", err.message);
        showError("Erro ao enviar mensagem: " + err.message);
      }
    }

    /**
     * ✅ Manipula Enter para enviar
     */
    function handleKeyPress(event, chatId) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage(chatId);
      }
    }

    /**
     * ✅ Mostra mensagem de erro
     */
    function showError(message) {
      const alertBox = document.getElementById("alertBox");
      const alertMessage = document.getElementById("alertMessage");
      alertMessage.textContent = message;
      alertBox.classList.remove("d-none");
      setTimeout(() => {
        alertBox.classList.add("d-none");
      }, 5000);
    }

    /**
     * ✅ Mostra mensagem de sucesso
     */
    function showSuccess(message) {
      const successBox = document.getElementById("successBox");
      const successMessage = document.getElementById("successMessage");
      successMessage.textContent = message;
      successBox.classList.remove("d-none");
      setTimeout(() => {
        successBox.classList.add("d-none");
      }, 3000);
    }
  </script>

</body>

</html>
