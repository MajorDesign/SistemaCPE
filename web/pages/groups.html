<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Grupos - CPE Control</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/style.css">

  <style>
    .page-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid #e5e7eb;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .page-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin: 0;
    }

    .groups-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
      margin-bottom: 2rem;
    }

    .group-card {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 20px;
      transition: all 0.3s ease;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .group-card:hover {
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.12);
      transform: translateY(-4px);
      border-color: #667eea;
    }

    .group-icon {
      width: 48px;
      height: 48px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 24px;
    }

    .group-header {
      flex: 1;
    }

    .group-name {
      font-weight: 600;
      font-size: 18px;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .group-description {
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .group-meta {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 12px 0;
      border-top: 1px solid #e5e7eb;
      border-bottom: 1px solid #e5e7eb;
    }

    .group-meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #6b7280;
    }

    .group-meta-item i {
      color: #667eea;
    }

    .group-actions {
      display: flex;
      gap: 8px;
    }

    .btn-group-action {
      flex: 1;
      padding: 0.6rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      background: white;
      color: #1f2937;
      font-weight: 600;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-group-action:hover {
      background: #f3f4f6;
      border-color: #667eea;
      color: #667eea;
    }

    .btn-group-action.danger {
      color: #dc2626;
    }

    .btn-group-action.danger:hover {
      background: rgba(220, 38, 38, 0.1);
      border-color: #dc2626;
    }

    .btn-new-group {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      white-space: nowrap;
      transition: all 0.3s ease;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-new-group:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      color: white;
      text-decoration: none;
    }

    .empty-state {
      text-align: center;
      padding: 3rem 2rem;
      color: #6b7280;
      grid-column: 1 / -1;
    }

    .empty-state-icon {
      font-size: 3rem;
      color: #d1d5db;
      margin-bottom: 1rem;
    }

    .alert {
      border: none;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .alert-danger {
      background-color: rgba(220, 38, 38, 0.1);
      color: #991b1b;
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #065f46;
    }

    .modal-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
    }

    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }

    .d-none {
      display: none;
    }

    @media (max-width: 768px) {
      .groups-container {
        grid-template-columns: 1fr;
      }

      .group-meta {
        grid-template-columns: 1fr;
      }

      .group-actions {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>
  <!-- ============================================================ -->
  <!-- 🔒 LOADING PAGE -->
  <!-- ============================================================ -->
  <div id="loadingPage"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); z-index: 9999;">
    <div style="text-align: center; color: white;">
      <div class="spinner-border" role="status"
        style="width: 3rem; height: 3rem; border: 0.3em solid rgba(255,255,255,.3); border-radius: 50%; border-top-color: white;">
        <span class="visually-hidden">Carregando...</span>
      </div>
      <p style="margin-top: 1rem;">Inicializando página...</p>
    </div>
  </div>
  <!-- ============================================================ -->

  <!-- CONTAINER PRINCIPAL -->
  <div class="container-main" style="display: none;">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-logo">CPE</div>
        <div class="sidebar-title">CONTROL</div>
      </div>

      <div class="search-box">
        <input type="text" placeholder="Buscar">
      </div>

      <ul class="sidebar-menu"></ul>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main-content">
      <div class="top-bar">
        <button class="menu-toggle">☰</button>
        <h1><i class="bi bi-diagram-3"></i> Gerenciar Grupos</h1>
      </div>

      <div class="content">
        <!-- ALERTS -->
        <div class="alert alert-danger d-none" id="alertBox" role="alert">
          <i class="bi bi-exclamation-circle"></i>
          <span id="alertMessage"></span>
        </div>

        <div class="alert alert-success d-none" id="successBox" role="alert">
          <i class="bi bi-check-circle"></i>
          <span id="successMessage">Operação realizada com sucesso!</span>
        </div>

        <!-- PAGE HEADER -->
        <div class="page-header">
          <h2 class="page-title">
            <i class="bi bi-folder-plus"></i> Meus Grupos
          </h2>
          <button class="btn-new-group" id="btnNewGroup" data-bs-toggle="modal" data-bs-target="#groupModal">
            <i class="bi bi-plus-lg"></i> Novo Grupo
          </button>
        </div>

        <!-- GROUPS GRID -->
        <div class="groups-container" id="groupsList">
          <div class="empty-state">
            <div class="empty-state-icon">
              <i class="bi bi-inbox"></i>
            </div>
            <p>Carregando grupos...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MODAL: Novo/Editar Grupo -->
  <!-- ============================================================ -->
  <div class="modal fade" id="groupModal" tabindex="-1" aria-labelledby="groupModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="groupModalLabel">
            <i class="bi bi-plus-square"></i> Novo Grupo
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body" style="padding: 2rem;">
          <div class="alert alert-danger d-none" id="modalAlertBox" role="alert">
            <i class="bi bi-exclamation-circle"></i>
            <span id="modalAlertMessage"></span>
          </div>

          <form id="groupForm" novalidate>
            <!-- Nome do Grupo -->
            <div class="mb-3">
              <label for="groupName" class="form-label">
                <i class="bi bi-input-cursor"></i> Nome do Grupo
              </label>
              <input type="text" class="form-control" id="groupName" placeholder="Ex: Suporte Técnico" required />
            </div>

            <!-- Descrição -->
            <div class="mb-3">
              <label for="groupDescription" class="form-label">
                <i class="bi bi-file-text"></i> Descrição
              </label>
              <textarea class="form-control" id="groupDescription" rows="4"
                placeholder="Descreva o propósito deste grupo..."></textarea>
              <small class="form-text text-muted">Opcional</small>
            </div>

            <!-- Nível de Permissão -->
            <div class="mb-3">
              <label for="groupPermission" class="form-label">
                <i class="bi bi-shield-check"></i> Nível de Permissão
              </label>
              <select class="form-select" id="groupPermission" required>
                <option value="">Selecione o nível...</option>
                <option value="admin">Administrador</option>
                <option value="editor">Editor</option>
                <option value="viewer">Visualizador</option>
                <option value="custom">Personalizado</option>
              </select>
            </div>

            <!-- Botões -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1" id="submitBtn">
                <i class="bi bi-check-lg"></i> Criar Grupo
              </button>
              <button type="button" class="btn btn-secondary flex-grow-1" data-bs-dismiss="modal">
                <i class="bi bi-x-lg"></i> Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📦 SCRIPTS -->
  <!-- ============================================================ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/SistemaCPE/web/assests/js/api.js"></script>
  <script src="/SistemaCPE/web/assests/js/config.js"></script>
  <script src="/SistemaCPE/web/assests/js/nav.js"></script>

  <!-- ============================================================ -->
  <!-- 🔧 INICIALIZAÇÃO DA PÁGINA -->
  <!-- ============================================================ -->
  <script>
    console.log("\n" + "=".repeat(80));
    console.log("[GROUPS/PAGE] 📄 Inicializando página de Gerenciamento de Grupos");
    console.log("[GROUPS/PAGE] ℹ️  Modo: SEM AUTENTICAÇÃO - Acesso público");
    console.log("=".repeat(80) + "\n");

    document.addEventListener("DOMContentLoaded", async () => {
      console.log("[GROUPS/INIT] 📋 DOM Carregado");

      try {
        // ===== Mostrar Conteúdo =====
        const loadingPage = document.getElementById("loadingPage");
        const containerMain = document.querySelector(".container-main");
        
        loadingPage.style.display = "none";
        containerMain.style.display = "flex";
        
        console.log("[GROUPS/INIT] ✅ Página inicializada com sucesso");
        console.log("=".repeat(80) + "\n");

        // ===== Carregar Grupos =====
        await loadGroups();

      } catch (err) {
        console.error("[GROUPS/INIT] ❌ ERRO NA INICIALIZAÇÃO");
        console.error("[GROUPS/INIT] 📍 Mensagem:", err.message);
        console.error("[GROUPS/INIT] 🔗 Stack:", err.stack);
        console.error("=".repeat(80) + "\n");
        
        showError("Erro ao inicializar página: " + err.message);
      }
    });
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÕES DA PÁGINA -->
  <!-- ============================================================ -->
  <script>
    let groups = [];
    let selectedGroupId = null;

    /**
     * ✅ Carrega os grupos
     */
    async function loadGroups() {
      console.log("\n[GROUPS/LOAD] 📥 Carregando grupos...");

      try {
        // Simular dados de API - substitua pela chamada real
        groups = [
          {
            id: 1,
            name: "Suporte Técnico",
            description: "Equipe responsável pelo suporte técnico aos clientes e resolução de problemas",
            permission: "admin",
            members: 5,
            created: "2024-01-15"
          },
          {
            id: 2,
            name: "Vendas",
            description: "Equipe comercial responsável pelas negociações e prospecção de clientes",
            permission: "editor",
            members: 8,
            created: "2024-01-10"
          },
          {
            id: 3,
            name: "Desenvolvimento",
            description: "Equipe de desenvolvimento e manutenção de software com foco em inovação",
            permission: "admin",
            members: 12,
            created: "2023-12-20"
          },
          {
            id: 4,
            name: "Gestão de Projetos",
            description: "Equipe responsável pelo planejamento e execução de projetos",
            permission: "editor",
            members: 6,
            created: "2024-02-05"
          }
        ];

        console.log("[GROUPS/LOAD] ✓", groups.length, "grupos carregados");
        renderGroups();
        console.log("[GROUPS/LOAD] ✅ Grupos renderizados\n");

      } catch (err) {
        console.error("[GROUPS/LOAD] ✗ Erro:", err.message);
        showError("Erro ao carregar grupos: " + err.message);
      }
    }

    /**
     * ✅ Renderiza os grupos
     */
    function renderGroups() {
      console.log("[GROUPS/RENDER] 🎨 Renderizando grupos");
      const groupsList = document.getElementById("groupsList");

      if (!groups || groups.length === 0) {
        groupsList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <i class="bi bi-inbox"></i>
            </div>
            <p>Nenhum grupo encontrado</p>
            <p style="font-size: 12px; margin-top: 1rem;">Clique em "Novo Grupo" para criar um</p>
          </div>
        `;
        return;
      }

      groupsList.innerHTML = groups.map(group => `
        <div class="group-card">
          <div style="display: flex; gap: 12px;">
            <div class="group-icon">
              <i class="bi bi-people-fill"></i>
            </div>
            <div class="group-header">
              <div class="group-name">${group.name}</div>
              <div class="group-description">${group.description || "Sem descrição"}</div>
            </div>
          </div>

          <div class="group-meta">
            <div class="group-meta-item">
              <i class="bi bi-people"></i>
              <span>${group.members} membros</span>
            </div>
            <div class="group-meta-item">
              <i class="bi bi-shield-check"></i>
              <span>${getPermissionLabel(group.permission)}</span>
            </div>
            <div class="group-meta-item">
              <i class="bi bi-calendar"></i>
              <span>${formatDate(group.created)}</span>
            </div>
          </div>

          <div class="group-actions">
            <button class="btn-group-action" onclick="editGroup(${group.id}, event)">
              <i class="bi bi-pencil"></i> Editar
            </button>
            <button class="btn-group-action danger" onclick="deleteGroup(${group.id}, '${group.name.replace(/'/g, "\\'")}', event)">
              <i class="bi bi-trash"></i> Deletar
            </button>
          </div>
        </div>
      `).join("");
    }

    /**
     * ✅ Retorna label da permissão
     */
    function getPermissionLabel(permission) {
      const labels = {
        admin: "Administrador",
        editor: "Editor",
        viewer: "Visualizador",
        custom: "Personalizado"
      };
      return labels[permission] || permission;
    }

    /**
     * ✅ Formata data
     */
    function formatDate(dateString) {
      if (!dateString) return "Sem data";
      const date = new Date(dateString);
      return date.toLocaleDateString("pt-BR", { month: "short", day: "numeric", year: "numeric" });
    }

    /**
     * ✅ Mostra mensagem de erro
     */
    function showError(message) {
      const alertBox = document.getElementById("alertBox");
      const alertMessage = document.getElementById("alertMessage");
      if (!alertBox || !alertMessage) return;

      alertMessage.textContent = message;
      alertBox.classList.remove("d-none");
      setTimeout(() => {
        alertBox.classList.add("d-none");
      }, 5000);
    }

    /**
     * ✅ Mostra mensagem de sucesso
     */
    function showSuccess(message) {
      const successBox = document.getElementById("successBox");
      const successMessage = document.getElementById("successMessage");
      if (!successBox || !successMessage) return;

      successMessage.textContent = message;
      successBox.classList.remove("d-none");
      setTimeout(() => {
        successBox.classList.add("d-none");
      }, 5000);
    }

    /**
     * ✅ Mostra erro no modal
     */
    function showModalError(message) {
      const modalAlert = document.getElementById("modalAlertBox");
      const modalAlertMsg = document.getElementById("modalAlertMessage");
      if (modalAlert && modalAlertMsg) {
        modalAlertMsg.textContent = message;
        modalAlert.classList.remove("d-none");
      }
    }

    /**
     * ✅ Esconde erro no modal
     */
    function hideModalError() {
      const modalAlert = document.getElementById("modalAlertBox");
      if (modalAlert) {
        modalAlert.classList.add("d-none");
      }
    }

    /**
     * ✅ Edita um grupo
     */
    function editGroup(groupId, event) {
      event.preventDefault();

      console.log("[GROUPS/EDIT] ✏️ Editando grupo:", groupId);

      const group = groups.find(g => g.id === groupId);
      if (!group) {
        console.error("[GROUPS/EDIT] ✗ Grupo não encontrado");
        return;
      }

      selectedGroupId = groupId;
      document.getElementById("groupModalLabel").innerHTML = '<i class="bi bi-pencil-square"></i> Editar Grupo';
      document.getElementById("groupName").value = group.name;
      document.getElementById("groupDescription").value = group.description;
      document.getElementById("groupPermission").value = group.permission;
      document.getElementById("submitBtn").innerHTML = '<i class="bi bi-check-lg"></i> Atualizar Grupo';

      hideModalError();
      const modal = new bootstrap.Modal(document.getElementById("groupModal"));
      modal.show();
    }

    /**
     * ✅ Deleta um grupo
     */
    function deleteGroup(groupId, groupName, event) {
      event.preventDefault();

      console.log("[GROUPS/DELETE] 🗑️ Deletando grupo:", groupId);

      if (!confirm(`Tem certeza que deseja deletar o grupo "${groupName}"?`)) {
        console.log("[GROUPS/DELETE] ⏭️ Deleção cancelada pelo usuário");
        return;
      }

      groups = groups.filter(g => g.id !== groupId);
      console.log("[GROUPS/DELETE] ✓ Grupo deletado com sucesso");
      showSuccess(`Grupo "${groupName}" deletado com sucesso!`);
      renderGroups();
    }

    /**
     * ✅ Submissão do formulário
     */
    document.getElementById("groupForm")?.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("groupName")?.value?.trim();
      const description = document.getElementById("groupDescription")?.value?.trim();
      const permission = document.getElementById("groupPermission")?.value;

      console.log("[GROUPS/SUBMIT] 📝 Processando grupo:", { name, permission, selectedGroupId });

      if (!name || !permission) {
        console.warn("[GROUPS/SUBMIT] ⚠️ Campos obrigatórios não preenchidos");
        showModalError("Preencha os campos obrigatórios!");
        return;
      }

      try {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processando...';

        // Simular delay de processamento
        await new Promise(resolve => setTimeout(resolve, 1000));

        if (selectedGroupId) {
          // ===== ATUALIZAR =====
          console.log("[GROUPS/SUBMIT] ✏️ Atualizando grupo:", selectedGroupId);
          const group = groups.find(g => g.id === selectedGroupId);
          if (group) {
            group.name = name;
            group.description = description;
            group.permission = permission;
            console.log("[GROUPS/SUBMIT] ✓ Grupo atualizado com sucesso");
          }
          showSuccess("Grupo atualizado com sucesso!");
        } else {
          // ===== CRIAR =====
          console.log("[GROUPS/SUBMIT] ➕ Criando novo grupo");
          const newGroup = {
            id: Math.max(...groups.map(g => g.id), 0) + 1,
            name,
            description,
            permission,
            members: 0,
            created: new Date().toISOString().split('T')[0]
          };
          groups.push(newGroup);
          console.log("[GROUPS/SUBMIT] ✓ Grupo criado com sucesso:", newGroup);
          showSuccess("Grupo criado com sucesso!");
        }

        document.getElementById("groupForm").reset();
        const modal = bootstrap.Modal.getInstance(document.getElementById("groupModal"));
        if (modal) modal.hide();

        selectedGroupId = null;
        renderGroups();

      } catch (err) {
        console.error("[GROUPS/SUBMIT] ✗ Erro:", err.message);
        showModalError("Erro ao processar grupo: " + err.message);
      } finally {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Criar Grupo';
      }
    });

    /**
     * ✅ Reset do modal ao abrir
     */
    document.getElementById("groupModal")?.addEventListener("show.bs.modal", () => {
      console.log("[GROUPS/MODAL] 📂 Modal aberto");
      if (!selectedGroupId) {
        document.getElementById("groupModalLabel").innerHTML = '<i class="bi bi-plus-square"></i> Novo Grupo';
        document.getElementById("groupForm").reset();
        document.getElementById("submitBtn").innerHTML = '<i class="bi bi-check-lg"></i> Criar Grupo';
      }
      hideModalError();
    });

    /**
     * ✅ Reset do modal ao fechar
     */
    document.getElementById("groupModal")?.addEventListener("hidden.bs.modal", () => {
      console.log("[GROUPS/MODAL] 🔒 Modal fechado");
      selectedGroupId = null;
    });
  </script>

</body>

</html>
