<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciar Grupos - CPE Control</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- ===== CSS IMPORTS ===== -->
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/global.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/app.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/layout.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/components.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/groups.css">
</head>

<body>
  <!-- ============================================================ -->
  <!-- 🔒 LOADING PAGE -->
  <!-- ============================================================ -->
  <div id="loadingPage" class="loading-page">
    <div class="loading-content">
      <div class="spinner-border" role="status">
        <span class="visually-hidden">Carregando...</span>
      </div>
      <p>Inicializando página...</p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- NAVBAR - Gerado por nav.js -->
  <!-- ============================================================ -->
  <nav id="navbar-container"></nav>

  <!-- ============================================================ -->
  <!-- CONTAINER PRINCIPAL -->
  <!-- ============================================================ -->
  <div class="container-main">
    <!-- ===== SIDEBAR - Gerado por nav.js ===== -->
    <div id="sidebar-container"></div>

    <!-- ===== MAIN CONTENT ===== -->
    <div class="main-content">
      <div class="content">
        <!-- ===== ALERTS ===== -->
        <div class="alert alert-danger d-none" id="alertBox" role="alert">
          <i class="bi bi-exclamation-circle"></i>
          <span id="alertMessage"></span>
        </div>

        <div class="alert alert-success d-none" id="successBox" role="alert">
          <i class="bi bi-check-circle"></i>
          <span id="successMessage">Operação realizada com sucesso!</span>
        </div>

        <!-- ===== PAGE HEADER ===== -->
        <div class="page-header">
          <h2 class="page-title">
            <i class="bi bi-folder-plus"></i> Meus Grupos
          </h2>
          <button class="btn-new-group" id="btnNewGroup" data-bs-toggle="modal" data-bs-target="#groupModal">
            <i class="bi bi-plus-lg"></i> Novo Grupo
          </button>
        </div>

        <!-- ===== GROUPS GRID ===== -->
        <div class="groups-container" id="groupsList">
          <div class="empty-state">
            <div class="empty-state-icon">
              <i class="bi bi-inbox"></i>
            </div>
            <p>Carregando grupos...</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- MODAL: Novo/Editar Grupo -->
  <!-- ============================================================ -->
  <div class="modal fade" id="groupModal" tabindex="-1" aria-labelledby="groupModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="groupModalLabel">
            <i class="bi bi-plus-square"></i> Novo Grupo
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Fechar"></button>
        </div>

        <div class="modal-body">
          <!-- ===== MODAL ALERT ===== -->
          <div class="alert alert-danger d-none" id="modalAlertBox" role="alert">
            <i class="bi bi-exclamation-circle"></i>
            <span id="modalAlertMessage"></span>
          </div>

          <!-- ===== FORM ===== -->
          <form id="groupForm" novalidate>
            <!-- Nome do Grupo -->
            <div class="mb-3">
              <label for="groupName" class="form-label">
                <i class="bi bi-input-cursor"></i> Nome do Grupo <span class="text-danger">*</span>
              </label>
              <input 
                type="text" 
                class="form-control" 
                id="groupName" 
                placeholder="Ex: Suporte Técnico" 
                required 
                minlength="3"
                maxlength="255"
              />
              <small class="form-text text-muted">Mínimo 3 caracteres</small>
            </div>

            <!-- Descrição -->
            <div class="mb-3">
              <label for="groupDescription" class="form-label">
                <i class="bi bi-file-text"></i> Descrição
              </label>
              <textarea 
                class="form-control" 
                id="groupDescription" 
                rows="4"
                placeholder="Descreva o propósito deste grupo..."
                maxlength="500"
              ></textarea>
              <small class="form-text text-muted">Opcional - Máximo 500 caracteres</small>
            </div>

            <!-- Botões -->
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary flex-grow-1" id="submitBtn">
                <i class="bi bi-check-lg"></i> Criar Grupo
              </button>
              <button type="button" class="btn btn-secondary flex-grow-1" data-bs-dismiss="modal">
                <i class="bi bi-x-lg"></i> Cancelar
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📦 SCRIPTS -->
  <!-- ============================================================ -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="/SistemaCPE/web/assests/js/api.js"></script>
  <script src="/SistemaCPE/web/assests/js/config.js"></script>
  <script src="/SistemaCPE/web/assests/js/nav.js"></script>

  <!-- ============================================================ -->
  <!-- 🔧 VARIÁVEIS GLOBAIS -->
  <!-- ============================================================ -->
  <script>
    let groups = [];
    let selectedGroupId = null;
    const API_URL = 'http://localhost:8000/api/groups/';

    console.log("[GROUPS/CONFIG] 🔌 Variáveis globais inicializadas");
    console.log("[GROUPS/CONFIG] 📍 API Groups URL:", API_URL);
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 INICIALIZAÇÃO DA PÁGINA -->
  <!-- ============================================================ -->
  <script>
    console.log("\n" + "=".repeat(80));
    console.log("[GROUPS/PAGE] 📄 Inicializando página de Gerenciamento de Grupos");
    console.log("[GROUPS/PAGE] 🔗 Conectado ao FastAPI em http://localhost:8000");
    console.log("=".repeat(80) + "\n");

    document.addEventListener("DOMContentLoaded", async () => {
      console.log("[GROUPS/INIT] 📋 DOM Carregado");

      try {
        // ===== Aguardar nav.js estar pronto =====
        await new Promise(resolve => {
          const checkNav = setInterval(() => {
            const navContainer = document.getElementById("navbar-container");
            if (navContainer && navContainer.innerHTML.trim() !== "") {
              clearInterval(checkNav);
              resolve();
            }
          }, 100);
          setTimeout(() => {
            clearInterval(checkNav);
            resolve();
          }, 5000);
        });

        // ===== Mostrar Conteúdo =====
        const loadingPage = document.getElementById("loadingPage");
        const containerMain = document.querySelector(".container-main");
        
        if (loadingPage) loadingPage.style.display = "none";
        if (containerMain) containerMain.style.display = "flex";
        
        console.log("[GROUPS/INIT] ✅ Página inicializada com sucesso");

        // ===== Carregar Grupos =====
        await loadGroups();

        console.log("=".repeat(80) + "\n");

      } catch (err) {
        console.error("[GROUPS/INIT] ❌ ERRO NA INICIALIZAÇÃO");
        console.error("[GROUPS/INIT] 📍 Mensagem:", err.message);
        console.error("[GROUPS/INIT] 🔗 Stack:", err.stack);
        console.error("=".repeat(80) + "\n");
        
        showError("Erro ao inicializar página: " + err.message);
      }
    });
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: loadGroups() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: loadGroups()
     * DESCRIÇÃO: Carrega os grupos da API FastAPI
     */
    async function loadGroups() {
      console.log("\n[GROUPS/LOAD] 📥 Carregando grupos da API FastAPI...");

      try {
        const response = await fetch(API_URL, {
          method: 'GET',
          headers: {
            'Content-Type': 'application/json'
          }
        });

        if (!response.ok) {
          console.error(`[GROUPS/LOAD] ✗ Erro HTTP: ${response.status}`);
          showError(`Erro ao carregar grupos: HTTP ${response.status}`);
          groups = [];
          renderGroups();
          return;
        }

        groups = await response.json();
        console.log(`[GROUPS/LOAD] ✓ ${groups.length} grupo(s) carregado(s)`);
        renderGroups();
        console.log("[GROUPS/LOAD] ✅ Grupos renderizados\n");

      } catch (err) {
        console.error("[GROUPS/LOAD] ✗ Erro:", err.message);
        showError("Erro ao carregar grupos: " + err.message);
        groups = [];
        renderGroups();
      }
    }
    /**
     * ✅ FIM: loadGroups()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: renderGroups() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: renderGroups()
     * DESCRIÇÃO: Renderiza os grupos na página
     */
    function renderGroups() {
      console.log("[GROUPS/RENDER] 🎨 Renderizando grupos");
      const groupsList = document.getElementById("groupsList");

      if (!groupsList) {
        console.error("[GROUPS/RENDER] ✗ Elemento #groupsList não encontrado");
        return;
      }

      if (!groups || groups.length === 0) {
        groupsList.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">
              <i class="bi bi-inbox"></i>
            </div>
            <p>Nenhum grupo encontrado</p>
            <p style="font-size: 12px; margin-top: 1rem;">Clique em "Novo Grupo" para criar um</p>
          </div>
        `;
        console.log("[GROUPS/RENDER] ℹ️ Nenhum grupo para renderizar");
        return;
      }

      groupsList.innerHTML = groups.map(group => {
        const createdDate = formatDate(group.created_at);
        const description = group.description || "Sem descrição";
        
        return `
          <div class="group-card">
            <div class="group-header-content">
              <div class="group-icon">
                <i class="bi bi-people-fill"></i>
              </div>
              <div class="group-header">
                <div class="group-name">${escapeHtml(group.name)}</div>
                <div class="group-description">${escapeHtml(description)}</div>
              </div>
            </div>

            <div class="group-meta">
              <div class="group-meta-item">
                <i class="bi bi-calendar"></i>
                <span>${createdDate}</span>
              </div>
              <div class="group-meta-item">
                <i class="bi bi-info-circle"></i>
                <span>ID: ${group.id}</span>
              </div>
            </div>

            <div class="group-actions">
              <button class="btn-group-action" onclick="editGroup(${group.id}, event)">
                <i class="bi bi-pencil"></i> Editar
              </button>
              <button class="btn-group-action danger" onclick="deleteGroup(${group.id}, '${group.name.replace(/'/g, "\\'")}', event)">
                <i class="bi bi-trash"></i> Deletar
              </button>
            </div>
          </div>
        `;
      }).join("");

      console.log(`[GROUPS/RENDER] ✓ ${groups.length} grupo(s) renderizado(s)`);
    }
    /**
     * ✅ FIM: renderGroups()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: escapeHtml() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: escapeHtml()
     * DESCRIÇÃO: Escapa caracteres especiais em HTML (segurança contra XSS)
     */
    function escapeHtml(text) {
      if (!text || typeof text !== 'string') {
        return '';
      }

      const map = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#039;'
      };

      return text.replace(/[&<>"']/g, char => map[char]);
    }
    /**
     * ✅ FIM: escapeHtml()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: formatDate() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: formatDate()
     * DESCRIÇÃO: Formata data para formato brasileiro
     */
    function formatDate(dateString) {
      if (!dateString) return "Sem data";
      try {
        const date = new Date(dateString);
        return date.toLocaleDateString("pt-BR", { 
          weekday: "short",
          year: "numeric",
          month: "short", 
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit"
        });
      } catch (err) {
        return "Data inválida";
      }
    }
    /**
     * ✅ FIM: formatDate()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: showError() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: showError()
     * DESCRIÇÃO: Mostra mensagem de erro na página
     */
    function showError(message) {
      console.log(`[GROUPS/ALERT] ❌ Erro: ${message}`);

      const alertBox = document.getElementById("alertBox");
      const alertMessage = document.getElementById("alertMessage");
      if (!alertBox || !alertMessage) return;

      alertMessage.textContent = message;
      alertBox.classList.remove("d-none");
      setTimeout(() => {
        alertBox.classList.add("d-none");
      }, 5000);
    }
    /**
     * ✅ FIM: showError()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: showSuccess() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: showSuccess()
     * DESCRIÇÃO: Mostra mensagem de sucesso na página
     */
    function showSuccess(message) {
      console.log(`[GROUPS/ALERT] ✅ Sucesso: ${message}`);

      const successBox = document.getElementById("successBox");
      const successMessage = document.getElementById("successMessage");
      if (!successBox || !successMessage) return;

      successMessage.textContent = message;
      successBox.classList.remove("d-none");
      setTimeout(() => {
        successBox.classList.add("d-none");
      }, 5000);
    }
    /**
     * ✅ FIM: showSuccess()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: showModalError() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: showModalError()
     * DESCRIÇÃO: Mostra mensagem de erro dentro do modal
     */
    function showModalError(message) {
      console.log(`[GROUPS/MODAL/ERROR] ⚠️ ${message}`);

      const modalAlert = document.getElementById("modalAlertBox");
      const modalAlertMsg = document.getElementById("modalAlertMessage");
      if (modalAlert && modalAlertMsg) {
        modalAlertMsg.textContent = message;
        modalAlert.classList.remove("d-none");
      }
    }
    /**
     * ✅ FIM: showModalError()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: hideModalError() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: hideModalError()
     * DESCRIÇÃO: Esconde mensagem de erro no modal
     */
    function hideModalError() {
      const modalAlert = document.getElementById("modalAlertBox");
      if (modalAlert) {
        modalAlert.classList.add("d-none");
      }
    }
    /**
     * ✅ FIM: hideModalError()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: editGroup() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: editGroup()
     * DESCRIÇÃO: Abre modal para editar um grupo
     */
    function editGroup(groupId, event) {
      event.preventDefault();

      console.log("[GROUPS/EDIT] ✏️ Editando grupo:", groupId);

      const group = groups.find(g => g.id === groupId);
      if (!group) {
        console.error("[GROUPS/EDIT] ✗ Grupo não encontrado");
        showError("Grupo não encontrado");
        return;
      }

      selectedGroupId = groupId;
      document.getElementById("groupModalLabel").innerHTML = '<i class="bi bi-pencil-square"></i> Editar Grupo';
      document.getElementById("groupName").value = group.name;
      document.getElementById("groupDescription").value = group.description || '';
      document.getElementById("submitBtn").innerHTML = '<i class="bi bi-check-lg"></i> Atualizar Grupo';

      hideModalError();
      const modal = new bootstrap.Modal(document.getElementById("groupModal"));
      modal.show();
    }
    /**
     * ✅ FIM: editGroup()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 FUNÇÃO: deleteGroup() -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: deleteGroup()
     * DESCRIÇÃO: Deleta um grupo via API FastAPI
     */
    function deleteGroup(groupId, groupName, event) {
      event.preventDefault();

      console.log("[GROUPS/DELETE] 🗑️ Deletando grupo:", groupId);

      if (!confirm(`Tem certeza que deseja deletar o grupo "${groupName}"?`)) {
        console.log("[GROUPS/DELETE] ⏭️ Deleção cancelada pelo usuário");
        return;
      }

      fetch(`${API_URL}${groupId}`, {
        method: 'DELETE',
        headers: {
          'Content-Type': 'application/json'
        }
      })
        .then(response => {
          if (response.status === 204 || response.ok) {
            console.log("[GROUPS/DELETE] ✓ Grupo deletado com sucesso");
            showSuccess(`Grupo "${groupName}" deletado com sucesso!`);
            loadGroups();
          } else if (response.status === 404) {
            throw new Error('Grupo não encontrado');
          } else {
            return response.json().then(result => {
              throw new Error(result.detail || 'Erro ao deletar');
            });
          }
        })
        .catch(err => {
          console.error("[GROUPS/DELETE] ❌ Erro:", err.message);
          showError("Erro ao deletar grupo: " + err.message);
        });
    }
    /**
     * ✅ FIM: deleteGroup()
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 EVENTO: Submissão do Formulário -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: Event Listener - Submissão do Formulário
     * DESCRIÇÃO: Submissão do formulário - CRIA ou ATUALIZA grupo
     */
    document.getElementById("groupForm")?.addEventListener("submit", async (e) => {
      e.preventDefault();

      const name = document.getElementById("groupName")?.value?.trim();
      const description = document.getElementById("groupDescription")?.value?.trim();

      console.log("[GROUPS/SUBMIT] 📝 Processando grupo:", { name, selectedGroupId });

      if (!name) {
        console.warn("[GROUPS/SUBMIT] ⚠️ Nome não preenchido");
        showModalError("Preencha o nome do grupo!");
        return;
      }

      try {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processando...';

        let url, method, body;

        if (selectedGroupId) {
          // ===== ATUALIZAR GRUPO =====
          console.log("[GROUPS/SUBMIT] ✏️ Atualizando grupo:", selectedGroupId);

          url = `${API_URL}${selectedGroupId}`;
          method = 'PUT';
          body = {
            name,
            description: description || null
          };

        } else {
          // ===== CRIAR NOVO GRUPO =====
          console.log("[GROUPS/SUBMIT] ➕ Criando novo grupo");

          url = API_URL;
          method = 'POST';
          body = {
            name,
            description: description || null
          };
        }

        console.log("[GROUPS/SUBMIT] 📨 Payload enviado:", JSON.stringify(body, null, 2));

        // 📡 Enviar para API
        const response = await fetch(url, {
          method: method,
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });

        console.log(`[GROUPS/SUBMIT] 📥 Status: ${response.status} ${response.statusText}`);

        const result = await response.json();

        if (response.ok) {
          console.log("[GROUPS/SUBMIT] ✅ Operação bem-sucedida");

          const message = selectedGroupId
            ? 'Grupo atualizado com sucesso!'
            : 'Grupo criado com sucesso!';

          showSuccess(message);

          // Fechar modal
          const modal = bootstrap.Modal.getInstance(document.getElementById("groupModal"));
          if (modal) modal.hide();

          // Resetar formulário
          document.getElementById("groupForm").reset();
          selectedGroupId = null;

          // Recarregar lista após 500ms
          setTimeout(() => {
            loadGroups();
          }, 500);

        } else {
          console.error("[GROUPS/SUBMIT] ❌ Erro na resposta da API");
          console.error("[GROUPS/SUBMIT] Status:", response.status);

          let errorMessage = 'Erro ao processar grupo!';

          if (result.detail) {
            if (Array.isArray(result.detail)) {
              errorMessage = result.detail.map(err => {
                const field = err.loc[err.loc.length - 1];
                return `${field}: ${err.msg}`;
              }).join(', ');
            } else {
              errorMessage = result.detail;
            }
          } else if (result.message) {
            errorMessage = result.message;
          }

          showModalError(errorMessage);
        }

      } catch (err) {
        console.error("[GROUPS/SUBMIT] ❌ Erro na requisição:", err.message);
        showModalError('Erro ao enviar dados: ' + err.message);

      } finally {
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-lg"></i> Criar Grupo';
      }
    });
    /**
     * ✅ FIM: Event Listener - Submissão do Formulário
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 EVENTO: Abertura do Modal -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: Event Listener - Abertura do Modal
     * DESCRIÇÃO: Quando o modal abre, resetar campos
     */
    document.getElementById("groupModal")?.addEventListener("show.bs.modal", () => {
      console.log("[GROUPS/MODAL] 📂 Modal aberto");
      
      if (!selectedGroupId) {
        document.getElementById("groupModalLabel").innerHTML = '<i class="bi bi-plus-square"></i> Novo Grupo';
        document.getElementById("groupForm").reset();
        document.getElementById("submitBtn").innerHTML = '<i class="bi bi-check-lg"></i> Criar Grupo';
      }
      hideModalError();
    });
    /**
     * ✅ FIM: Event Listener - Abertura do Modal
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 EVENTO: Fechamento do Modal -->
  <!-- ============================================================ -->
  <script>
    /**
     * ✅ INÍCIO: Event Listener - Fechamento do Modal
     * DESCRIÇÃO: Quando o modal fecha, resetar variáveis globais
     */
    document.getElementById("groupModal")?.addEventListener("hidden.bs.modal", () => {
      console.log("[GROUPS/MODAL] 🔒 Modal fechado");
      selectedGroupId = null;
    });
    /**
     * ✅ FIM: Event Listener - Fechamento do Modal
     */
  </script>

  <!-- ============================================================ -->
  <!-- 🔧 LOG FINAL -->
  <!-- ============================================================ -->
  <script>
    console.log("\n[GROUPS] ✅ Script carregado com integração FastAPI");
    console.log("[GROUPS] 📝 Funções disponíveis:");
    console.log("[GROUPS]   ✓ loadGroups()");
    console.log("[GROUPS]   ✓ renderGroups()");
