<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- ✅ LINK DO LAYOUT.CSS -->
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/layout.css">
</head>

<body class="login-page">
  <!-- ✅ BACKGROUND COM IMAGEM -->
  <div class="login-background"></div>

  <!-- ✅ WRAPPER -->
  <div class="login-wrapper">
    <div class="login-container">
      <!-- [INICIO] Header do Login -->
      <div class="login-header">
        <div class="login-logo"></div>
        <p class="login-subtitle">Sistema de Gerenciamento Inteligente</p>
      </div>
      <!-- [FIM] Header do Login -->

      <!-- [INICIO] Formulario de Login -->
      <form class="login-form" id="loginForm" novalidate>
        
        <!-- [INICIO] Caixa de Erro -->
        <div class="form-error" id="loginError">
          <span id="errorMessage"></span>
        </div>
        <!-- [FIM] Caixa de Erro -->

        <!-- [INICIO] Campo de Email ou Username -->
        <div class="form-group">
          <label class="form-label" for="credential">
            <span class="input-group-label">
              Email ou Usuario
            </span>
          </label>
          <input
            type="text"
            id="credential"
            class="form-input"
            placeholder="seu@email.com ou seu_usuario"
            autocomplete="username"
            required
            autofocus
          />
          <div class="input-helper">Use seu email ou nome de usuario cadastrado</div>
        </div>
        <!-- [FIM] Campo de Email ou Username -->

        <!-- [INICIO] Campo de Senha -->
        <div class="form-group">
          <label class="form-label" for="password">
            <span class="input-group-label">
              Senha
            </span>
          </label>
          <input
            type="password"
            id="password"
            class="form-input"
            placeholder="Digite sua senha"
            autocomplete="current-password"
            required
          />
          <div class="input-helper">Minimo 6 caracteres</div>
        </div>
        <!-- [FIM] Campo de Senha -->

        <!-- [INICIO] Botao de Envio -->
        <button type="submit" class="login-button" id="submitBtn">
          <span class="button-spinner"></span>
          <span class="button-text">Entrar no Sistema</span>
        </button>
        <!-- [FIM] Botao de Envio -->

      </form>
      <!-- [FIM] Formulario de Login -->

      <!-- [INICIO] Rodape -->
      <div class="login-footer">
        <p>CPE Control 2026 - Sistema de Gerenciamento Inteligente</p>
      </div>
      <!-- [FIM] Rodape -->

    </div>
  </div>

  <!-- [INICIO] Scripts - SEM ROUTE-PROTECTION -->
  <script src="/SistemaCPE/web/assests/js/api.js"></script>
  <script src="/SistemaCPE/web/assests/js/login.js"></script>
  <!-- [FIM] Scripts -->

</body>

</html>
