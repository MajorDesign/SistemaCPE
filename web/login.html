<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CPE Control — Inicializando...</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .loading-container {
      text-align: center;
      color: white;
    }

    .spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 2rem;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .loading-subtext {
      font-size: 0.95rem;
      opacity: 0.8;
    }

    .error-message {
      margin-top: 2rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      max-width: 400px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .error-title {
      color: #fca5a5;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .error-text {
      color: #fecaca;
      font-size: 0.9rem;
      line-height: 1.6;
    }

    .retry-button {
      margin-top: 1rem;
      padding: 0.75rem 1.5rem;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid white;
      color: white;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .retry-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }
  </style>
</head>

<body>
  <div class="loading-container">
    <div class="spinner"></div>
    <div class="loading-text">CPE Control</div>
    <div class="loading-subtext">Inicializando sistema...</div>

    <div class="error-message" id="errorBox">
      <div class="error-title">❌ Erro ao Inicializar</div>
      <div class="error-text" id="errorText"></div>
      <button class="retry-button" onclick="location.reload()">
        🔄 Tentar Novamente
      </button>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- 📦 SCRIPTS -->
  <!-- ============================================================ -->

  <script src="/SistemaCPE/web/assests/js/api.js"></script>

  <script>
    console.log("\n" + "=".repeat(80));
    console.log("[AUTO-LOGIN] 🔐 Inicializando auto-login automático");
    console.log("[AUTO-LOGIN] ℹ️  Modo: BYPASS DE AUTENTICAÇÃO - Sem seleção de usuário");
    console.log("=".repeat(80) + "\n");

    document.addEventListener("DOMContentLoaded", async () => {
      console.log("[AUTO-LOGIN/INIT] 📋 DOM Carregado");

      try {
        // ===== Carregar Usuários =====
        console.log("[AUTO-LOGIN/INIT] 👥 Buscando usuários disponíveis...");
        const users = await apiGetUsers();

        if (!Array.isArray(users) || users.length === 0) {
          throw new Error("Nenhum usuário encontrado no sistema");
        }

        console.log("[AUTO-LOGIN/INIT] ✓ Usuários encontrados:", users.length);

        // ===== Usar Primeiro Usuário =====
        const firstUser = users[0];
        console.log("[AUTO-LOGIN/INIT] 🎯 Auto-selecionando primeiro usuário");
        console.log("[AUTO-LOGIN/INIT]   • Nome:", firstUser.name);
        console.log("[AUTO-LOGIN/INIT]   • Email:", firstUser.email);
        console.log("[AUTO-LOGIN/INIT]   • ID:", firstUser.id);

        // ===== Carregar Dados do Usuário =====
        console.log("[AUTO-LOGIN/INIT] 📥 Carregando dados do usuário...");
        const result = await loadUser(firstUser.id);

        if (!result || !result.success) {
          throw new Error("Falha ao carregar dados do usuário");
        }

        console.log("[AUTO-LOGIN/INIT] ✅ Usuário carregado com sucesso!");

        // ===== Verificar Armazenamento =====
        console.log("[AUTO-LOGIN/INIT] 🔍 Verificando armazenamento...");
        const userLS = localStorage.getItem("user");
        const userIdLS = localStorage.getItem("user_id");
        const loggedInLS = localStorage.getItem("logged_in");

        console.log("[AUTO-LOGIN/INIT] 📦 Verificação de localStorage:");
        console.log("[AUTO-LOGIN/INIT]   • user:", userLS ? "✓ EXISTE" : "✗ NÃO EXISTE");
        console.log("[AUTO-LOGIN/INIT]   • user_id:", userIdLS || "✗ NÃO EXISTE");
        console.log("[AUTO-LOGIN/INIT]   • logged_in:", loggedInLS || "✗ NÃO EXISTE");

        if (!userIdLS || !loggedInLS) {
          throw new Error("Falha ao salvar dados de sessão");
        }

        // ===== Redirecionar =====
        console.log("[AUTO-LOGIN/INIT] ✅ INICIALIZAÇÃO CONCLUÍDA COM SUCESSO");
        console.log("[AUTO-LOGIN/INIT] ⏳ Redirecionando para dashboard...");
        console.log("=".repeat(80) + "\n");

        // Aguarda 1 segundo para mostrar a animação
        setTimeout(() => {
          window.location.href = "/SistemaCPE/index.html";
        }, 1000);

      } catch (err) {
        console.error("[AUTO-LOGIN/INIT] ❌ ERRO NA INICIALIZAÇÃO");
        console.error("[AUTO-LOGIN/INIT] 📍 Mensagem:", err.message);
        console.error("[AUTO-LOGIN/INIT] 🔗 Stack:", err.stack);
        console.error("=".repeat(80) + "\n");

        // Mostrar erro
        const errorBox = document.getElementById("errorBox");
        const errorText = document.getElementById("errorText");

        errorText.textContent = err.message || "Erro desconhecido ao inicializar o sistema.";
        errorBox.classList.add("show");

        // Aguardar antes de permitir novo carregamento
        console.log("[AUTO-LOGIN/INIT] ⏳ Aguardando para tentar novamente...");
      }
    });
  </script>

</body>

</html>
