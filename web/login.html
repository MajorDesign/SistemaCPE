<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CPE Control — Login</title>
  
  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Estilos Customizados -->
  <style>
    :root {
      --primary: #667eea;
      --secondary: #764ba2;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --light: #f3f4f6;
      --dark: #1f2937;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .login-container {
      width: 100%;
      max-width: 450px;
    }

    .card {
      border: none;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }

    .card-body {
      padding: 3rem 2.5rem;
    }

    .header-text {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.75rem;
    }

    .form-label {
      font-weight: 600;
      color: var(--dark);
      margin-bottom: 0.5rem;
      font-size: 0.95rem;
    }

    .form-control {
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
      outline: none;
    }

    .form-control.is-invalid {
      border-color: var(--danger);
    }

    .form-control.is-invalid:focus {
      box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
    }

    .invalid-feedback {
      display: block;
      color: var(--danger);
      font-size: 0.85rem;
      margin-top: 0.25rem;
    }

    .alert {
      border: none;
      border-radius: 8px;
      margin-bottom: 1.5rem;
    }

    .alert-danger {
      background-color: rgba(239, 68, 68, 0.1);
      color: #991b1b;
    }

    .alert-success {
      background-color: rgba(16, 185, 129, 0.1);
      color: #065f46;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      border: none;
      font-weight: 600;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      color: white;
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-primary:not(:disabled):active {
      transform: translateY(0);
    }

    .text-muted {
      color: #6b7280 !important;
      font-size: 0.85rem;
    }

    hr {
      border-color: #e5e7eb;
      opacity: 1;
    }

    .d-none {
      display: none;
    }

    .spinner-border-sm {
      width: 1rem;
      height: 1rem;
      margin-right: 0.5rem;
    }
  </style>
</head>

<body>

  <!-- Login Container -->
  <div class="login-container">
    <div class="card">
      <div class="card-body p-5">
        
        <!-- Logo / Título -->
        <h1 class="h3 mb-2 header-text">
          <i class="bi bi-shield-check"></i> CPE Control
        </h1>
        <p class="text-muted mb-4">Acesse sua conta para continuar</p>

        <!-- Alert de Erro -->
        <div id="alertBox" class="alert alert-danger d-none" role="alert">
          <i class="bi bi-exclamation-circle"></i>
          <span id="alertMessage">Erro ao fazer login</span>
        </div>

        <!-- Alert de Sucesso -->
        <div id="successBox" class="alert alert-success d-none" role="alert">
          <i class="bi bi-check-circle"></i>
          <span id="successMessage">Login realizado com sucesso. Redirecionando...</span>
        </div>

        <!-- Formulário de Login -->
        <form id="loginForm" novalidate>
          
          <!-- Campo Email -->
          <div class="mb-3">
            <label for="email" class="form-label">
              <i class="bi bi-envelope"></i> E-mail
            </label>
            <input
              id="email"
              type="email"
              class="form-control"
              placeholder="admin@cpe.com.br"
              required
              autocomplete="email"
            />
            <div class="invalid-feedback" id="emailError">
              Por favor, insira um e-mail válido.
            </div>
          </div>

          <!-- Campo Senha -->
          <div class="mb-3">
            <label for="password" class="form-label">
              <i class="bi bi-lock"></i> Senha
            </label>
            <input
              id="password"
              type="password"
              class="form-control"
              placeholder="••••••••"
              required
              autocomplete="current-password"
            />
            <div class="invalid-feedback" id="passwordError">
              Por favor, insira sua senha.
            </div>
          </div>

          <!-- Botão de Login -->
          <button
            id="loginBtn"
            class="btn btn-primary w-100 py-2"
            type="submit"
          >
            <i class="bi bi-box-arrow-in-right"></i> Entrar
          </button>

        </form>

        <hr class="my-4" />

        <!-- Footer Info -->
        <small class="text-muted d-block text-center">
          <i class="bi bi-shield-lock"></i> Login seguro com autenticação em sessão HTTP-only
        </small>

      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <!-- ✅ ORDEM IMPORTANTE: api.js PRIMEIRO! -->
  <script src="/SistemaCPE/web/assests/css/js/api.js"></script>

  <script>
    // =========================================
    // Página de Login
    // =========================================

    document.addEventListener("DOMContentLoaded", () => {
      console.log("\n" + "=".repeat(60));
      console.log("[LOGIN/PAGE] Inicializando página de login");
      console.log("=".repeat(60));

      // ===== Elementos do formulário =====
      const loginForm = document.getElementById("loginForm");
      const emailInput = document.getElementById("email");
      const passwordInput = document.getElementById("password");
      const loginBtn = document.getElementById("loginBtn");
      const alertBox = document.getElementById("alertBox");
      const alertMessage = document.getElementById("alertMessage");
      const successBox = document.getElementById("successBox");

      if (!loginForm) {
        console.error("[LOGIN/PAGE] ✗ Formulário de login NÃO encontrado");
        return;
      }

      console.log("[LOGIN/PAGE] ✓ Formulário de login encontrado");

      // Handler do formulário
      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        console.log("\n[LOGIN/SUBMIT] Processando login...");

        // Obtém os valores
        const email = emailInput?.value?.trim();
        const password = passwordInput?.value;

        // Validação básica
        if (!email || !password) {
          console.warn("[LOGIN/SUBMIT] Email ou senha vazios");
          alertMessage.textContent = "Por favor, preencha todos os campos.";
          alertBox.classList.remove("d-none");
          successBox.classList.add("d-none");
          return;
        }

        // Validação de email
        if (!email.includes("@")) {
          console.warn("[LOGIN/SUBMIT] Email inválido:", email);
          alertMessage.textContent = "Por favor, insira um e-mail válido.";
          alertBox.classList.remove("d-none");
          successBox.classList.add("d-none");
          return;
        }

        console.log("[LOGIN/SUBMIT] Email:", email);

        // Desabilita o botão
        loginBtn.disabled = true;
        const originalHTML = loginBtn.innerHTML;
        loginBtn.innerHTML = `
          <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
          Entrando...
        `;

        // Esconde os alertas
        alertBox.classList.add("d-none");
        successBox.classList.add("d-none");

        try {
          // ✅ Faz o login
          console.log("[LOGIN/SUBMIT] Chamando função login()...");
          const result = await login(email, password);
          
          console.log("[LOGIN/SUBMIT] ✓ Login bem-sucedido:", result);

          // Mostra mensagem de sucesso
          successBox.classList.remove("d-none");
          loginBtn.innerHTML = `
            <i class="bi bi-check-circle"></i> Login bem-sucedido!
          `;

          // Redireciona após 2 segundos
          setTimeout(() => {
            console.log("[LOGIN/SUBMIT] Redirecionando para dashboard...");
            window.location.href = "/SistemaCPE/index.html";
          }, 1500);

        } catch (err) {
          console.error("[LOGIN/SUBMIT] ✗ Erro:", err.message);

          // Mostra erro
          alertMessage.textContent = err.message || "Erro ao fazer login. Tente novamente.";
          alertBox.classList.remove("d-none");

          // Reabilita o botão
          loginBtn.disabled = false;
          loginBtn.innerHTML = originalHTML;
        }
      });

      console.log("[LOGIN/PAGE] ✓ Inicialização concluída");
      console.log("=".repeat(60) + "\n");
    });
  </script>

</body>

</html>
