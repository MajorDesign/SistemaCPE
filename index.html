<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <!-- ✅ CHARSET UTF-8 - IMPORTANTE PARA ACENTOS -->
  <meta charset="UTF-8">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Dashboard - CPE Control</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Global Styles -->
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/global.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/layout.css">
  <link rel="stylesheet" href="/SistemaCPE/web/assests/css/components.css">

  <!-- 🔐 PROTEÇÃO DE ROTAS (DEVE SER O PRIMEIRO SCRIPT!) -->
  <script src="/SistemaCPE/web/assests/js/route-protection.js"></script>
</head>

<body>
  <!-- ============================================================ -->
  <!-- LOADING PAGE -->
  <!-- ============================================================ -->
  <div id="loadingPage" class="loading-page">
    <div class="loading-content">
      <img src="/SistemaCPE/web/assests/images/logocpe.png" alt="CPE Control" class="loading-logo">
      <div class="loading-spinner"></div>
      <p class="loading-text">Verificando autenticação...</p>
    </div>
  </div>

  <!-- ============================================================ -->
  <!-- CONTAINER PRINCIPAL -->
  <!-- ============================================================ -->
  <div class="container-main" style="display: none;">
    
    <!-- ============================================================ -->
    <!-- NAVBAR - Carregada pelo nav.js -->
    <!-- ============================================================ -->
    <nav id="navbar-container"></nav>

    <!-- ============================================================ -->
    <!-- LAYOUT PRINCIPAL -->
    <!-- ============================================================ -->
    <div style="display: flex; width: 100%; flex: 1;">
      
      <!-- SIDEBAR - Carregada pelo nav.js -->
      <div id="sidebar-container"></div>

      <!-- Main Content -->
      <div class="main-content" style="flex: 1;">
        
        <!-- TOP BAR -->
        <div class="top-bar">
          <button class="menu-toggle" id="menuToggle">
            <i class="bi bi-list"></i>
          </button>
          <h1>Dashboard</h1>
        </div>

        <!-- CONTENT -->
        <div class="content">
          
          <!-- Stats Grid -->
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-label">Total de Tickets</div>
              <div class="stat-value" id="totalTickets">1,234</div>
              <div class="stat-change">+12% em relação ao mês anterior</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Resolvidos</div>
              <div class="stat-value" id="resolvedTickets">856</div>
              <div class="stat-change">Taxa de resolução: 69%</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Pendentes</div>
              <div class="stat-value" id="pendingTickets" style="color: var(--danger);">378</div>
              <div class="stat-change" style="color: var(--danger);">Requerem atenção</div>
            </div>

            <div class="stat-card">
              <div class="stat-label">Satisfação</div>
              <div class="stat-value" id="satisfactionRate" style="color: var(--success);">4.8/5</div>
              <div class="stat-change" style="color: var(--success);">Baseado em 234 avaliações</div>
            </div>
          </div>

          <!-- Tabela de Atividade Recente -->
          <div class="card">
            <h2 class="card-title">Atividade Recente</h2>
            <div class="table-container">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Título</th>
                    <th>Cliente</th>
                    <th>Status</th>
                    <th>Atualizado</th>
                  </tr>
                </thead>
                <tbody id="activityTableBody">
                  <tr>
                    <td colspan="5" style="text-align: center; padding: 2rem;">
                      <span style="color: var(--muted);">Carregando dados...</span>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- ============================================================ -->
  <!-- SCRIPTS -->
  <!-- ============================================================ -->

  <!-- Bootstrap -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Navegação -->
  <script src="/SistemaCPE/web/assests/js/nav.js"></script>

  <!-- API Utilities -->
  <script src="/SistemaCPE/web/assests/js/api.js"></script>

  <!-- 🔐 INICIALIZAÇÃO PÓS-AUTENTICAÇÃO -->
  <script>
    /**
     * 🎬 INICIALIZAÇÃO DO DASHBOARD
     * Aguarda o evento authenticationSuccess do route-protection.js
     */

    console.log("\n" + "=".repeat(80));
    console.log("[INDEX] Aguardando autenticação...");
    console.log("=".repeat(80) + "\n");

    // [INICIO] Event Listener: authenticationSuccess
    document.addEventListener("authenticationSuccess", (e) => {
      const user = e.detail?.user;

      if (!user) {
        console.error("[INDEX] ❌ Usuário não encontrado no evento de autenticação");
        return;
      }

      console.log("\n" + "=".repeat(80));
      console.log("[INDEX] 🎬 INICIALIZANDO DASHBOARD");
      console.log("=".repeat(80));
      console.log(`[INDEX] 👤 Usuário: ${user.name}`);
      console.log(`[INDEX] 📧 Email: ${user.email}`);
      console.log(`[INDEX] 🎭 Role: ${user.role}`);
      console.log(`[INDEX] 🆔 ID: ${user.id}`);

      // ====================================
      // VERIFICAR PERMISSÕES
      // ====================================
      if (window.authProtection?.hasRole) {
        if (window.authProtection.hasRole("ADMIN")) {
          console.log("[INDEX] ✅ Acesso como ADMIN - Todos os dados visíveis");
        } else if (window.authProtection.hasRole("MANAGER")) {
          console.log("[INDEX] ℹ️  Acesso como MANAGER - Dados restritos");
        } else {
          console.log("[INDEX] ℹ️  Acesso como USER - Visão limitada");
        }
      } else {
        console.warn("[INDEX] ⚠️  Objeto authProtection não encontrado");
      }

      // ====================================
      // INICIALIZAR COMPONENTES
      // ====================================
      try {
        // Mostrar container principal
        const containerMain = document.querySelector(".container-main");
        const loadingPage = document.getElementById("loadingPage");

        if (containerMain) {
          containerMain.style.display = "flex";
          console.log("[INDEX] ✓ Container principal exibido");
        }

        if (loadingPage) {
          loadingPage.style.display = "none";
          console.log("[INDEX] ✓ Loading page ocultada");
        }

        setupMenuToggle();
        setActiveMenu();
        loadDashboardData(user);
        
        console.log("[INDEX] ✅ Dashboard inicializado com sucesso!");
        console.log("=".repeat(80) + "\n");

      } catch (err) {
        console.error("[INDEX] ❌ Erro na inicialização:", err.message);
        console.error("[INDEX] Stack:", err.stack);
        showError("Erro ao inicializar dashboard", err.message);
      }
    });
    // [FIM] Event Listener: authenticationSuccess

    // [INICIO] Fallback: Se não houver autenticação após 5 segundos
    setTimeout(() => {
      const loadingPage = document.getElementById("loadingPage");
      if (loadingPage && loadingPage.style.display !== "none") {
        console.warn("[INDEX] ⚠️  Autenticação não completada em 5 segundos");
        showError(
          "Erro de Autenticação",
          "Não conseguimos verificar suas credenciais. Tente fazer login novamente."
        );
      }
    }, 5000);
    // [FIM] Fallback

    // ====================================
    // FUNÇÃO: Setup Menu Toggle
    // ====================================
    // [INICIO] setupMenuToggle()
    function setupMenuToggle() {
      const menuToggle = document.getElementById("menuToggle");
      const sidebarContainer = document.getElementById("sidebar-container");

      if (!menuToggle || !sidebarContainer) {
        console.warn("[INDEX] ⚠️  Elementos do menu não encontrados");
        return;
      }

      menuToggle.addEventListener("click", () => {
        const sidebar = sidebarContainer.querySelector(".sidebar");
        if (sidebar) {
          sidebar.classList.toggle("collapsed");
          console.log("[INDEX] ☰ Menu toggled");
        }
      });

      console.log("[INDEX] ✓ Menu toggle configurado");
    }
    // [FIM] setupMenuToggle()

    // ====================================
    // FUNÇÃO: Marcar Menu Ativo
    // ====================================
    // [INICIO] setActiveMenu()
    function setActiveMenu() {
      try {
        const dashboardLink = document.querySelector('a[href*="index.html"]');
        if (dashboardLink) {
          // Remover classe active de todos os links
          document.querySelectorAll(".sidebar a").forEach(link => {
            link.classList.remove("active");
            link.parentElement?.classList.remove("active");
          });

          // Adicionar ao dashboard
          dashboardLink.classList.add("active");
          dashboardLink.parentElement?.classList.add("active");
          console.log("[INDEX] ✓ Menu Dashboard marcado como ativo");
        } else {
          console.warn("[INDEX] ⚠️  Link do dashboard não encontrado");
        }
      } catch (err) {
        console.warn("[INDEX] ⚠️  Erro ao marcar menu ativo:", err.message);
      }
    }
    // [FIM] setActiveMenu()

    // ====================================
    // FUNÇÃO: Carregar Dados do Dashboard
    // ====================================
    // [INICIO] loadDashboardData()
    function loadDashboardData(user) {
      console.log("[INDEX] 📊 Carregando dados do dashboard...");

      // Dados de exemplo
      const sampleData = [
        {
          id: "#1234",
          titulo: "Problema com login",
          cliente: "João Silva",
          status: "Resolvido",
          statusClass: "badge-success",
          atualizado: "2 horas atrás"
        },
        {
          id: "#1233",
          titulo: "Erro ao processar pagamento",
          cliente: "Maria Santos",
          status: "Em Andamento",
          statusClass: "badge-primary",
          atualizado: "4 horas atrás"
        },
        {
          id: "#1232",
          titulo: "Dúvida sobre funcionalidade",
          cliente: "Pedro Costa",
          status: "Aberto",
          statusClass: "badge-warning",
          atualizado: "6 horas atrás"
        },
        {
          id: "#1231",
          titulo: "Solicitação de feature",
          cliente: "Ana Oliveira",
          status: "Aberto",
          statusClass: "badge-warning",
          atualizado: "1 dia atrás"
        }
      ];

      // Preencher tabela
      try {
        const tableBody = document.getElementById("activityTableBody");
        if (tableBody) {
          tableBody.innerHTML = sampleData.map(item => `
            <tr>
              <td><strong>${item.id}</strong></td>
              <td>${item.titulo}</td>
              <td>${item.cliente}</td>
              <td><span class="badge ${item.statusClass}">${item.status}</span></td>
              <td>${item.atualizado}</td>
            </tr>
          `).join("");
          
          console.log("[INDEX] ✓ Tabela de atividades carregada");
        } else {
          console.warn("[INDEX] ⚠️  Elemento activityTableBody não encontrado");
        }
      } catch (err) {
        console.error("[INDEX] ❌ Erro ao carregar tabela:", err.message);
      }

      // Atualizar stats
      updateStats(user);

      console.log("[INDEX] ✓ Dados carregados com sucesso");
    }
    // [FIM] loadDashboardData()

    // ====================================
    // FUNÇÃO: Atualizar Stats
    // ====================================
    // [INICIO] updateStats()
    function updateStats(user) {
      console.log("[INDEX] 📈 Atualizando estatísticas...");

      // Em produção, fazer requisições à API:
      // fetch(`/api/dashboard/stats?userId=${user.id}`)
      //   .then(res => res.json())
      //   .then(data => {
      //     document.getElementById("totalTickets").textContent = data.total;
      //     document.getElementById("resolvedTickets").textContent = data.resolved;
      //     document.getElementById("pendingTickets").textContent = data.pending;
      //     document.getElementById("satisfactionRate").textContent = data.satisfaction;
      //   })
      //   .catch(err => console.error("[INDEX] Erro ao carregar stats:", err));

      console.log("[INDEX] ✓ Estatísticas carregadas");
    }
    // [FIM] updateStats()

    // ====================================
    // FUNÇÃO: Mostrar Erro
    // ====================================
    // [INICIO] showError()
    function showError(title, message) {
      console.error(`[INDEX] ❌ ${title}: ${message}`);

      const loadingPage = document.getElementById("loadingPage");
      if (loadingPage) {
        loadingPage.innerHTML = `
          <div class="loading-error">
            <h3>⚠️ ${title}</h3>
            <p>${message}</p>
            <button onclick="location.href='/SistemaCPE/web/login.html'" class="loading-error-btn">
              🔐 Ir para Login
            </button>
          </div>
        `;
      }
    }
    // [FIM] showError()

    // ====================================
    // TRATAMENTO DE ERROS GLOBAIS
    // ====================================
    // [INICIO] Error Handlers
    window.addEventListener("error", (e) => {
      console.error("[INDEX] 🔴 ERRO GLOBAL:", e.message);
      console.error("[INDEX] Stack:", e.stack);
    });

    window.addEventListener("unhandledrejection", (e) => {
      console.error("[INDEX] 🔴 PROMISE REJECTION:", e.reason);
    });
    // [FIM] Error Handlers

  </script>

</body>

</html>
