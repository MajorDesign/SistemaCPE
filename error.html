<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Erro de Acesso</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .error-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      padding: 3rem 2rem;
      text-align: center;
      max-width: 500px;
      width: 100%;
    }

    .error-code {
      font-size: 6rem;
      font-weight: 700;
      color: #667eea;
      margin-bottom: 1rem;
      line-height: 1;
    }

    .error-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 1rem;
    }

    .error-message {
      font-size: 1rem;
      color: #6b7280;
      margin-bottom: 2rem;
      line-height: 1.6;
    }

    .error-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% {
        transform: translateY(0);
      }
      50% {
        transform: translateY(-10px);
      }
    }

    .btn-redirect {
      display: inline-block;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }

    .btn-redirect:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      color: white;
    }

    .error-details {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid #e5e7eb;
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .countdown {
      font-size: 0.9rem;
      color: #667eea;
      margin-top: 1.5rem;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="error-container">
    <div class="error-icon">🚫</div>
    
    <div class="error-code" id="errorCode">403</div>
    
    <h1 class="error-title" id="errorTitle">Acesso Proibido</h1>
    
    <p class="error-message" id="errorMessage">
      Você não tem permissão para acessar este recurso. 
      Você será redirecionado para a página inicial em breve.
    </p>

    <button class="btn-redirect" onclick="redirectToHome()">
      ← Voltar ao Painel
    </button>

    <div class="countdown">
      Redirecionando em <span id="countdown">5</span> segundos...
    </div>

    <div class="error-details">
      <p>Se o problema persistir, contate o administrador do sistema.</p>
      <p style="margin-top: 0.5rem; color: #d1d5db;">CPE Control © 2026</p>
    </div>
  </div>

  <script>
    // =========================================
    // Error Page - Redirect Logic
    // =========================================

    /**
     * Redireciona para a página apropriada
     */
    function redirectToHome() {
      const hasCookie = document.cookie.includes("cpe_session");
      
      if (hasCookie) {
        // Se está autenticado, vai para o index
        window.location.href = "/SistemaCPE/index.html";
      } else {
        // Se não está, vai para login
        window.location.href = "/SistemaCPE/web/login.html";
      }
    }

    // ===== Countdown de Redirecionamento =====
    let seconds = 5;

    const countdown = setInterval(() => {
      seconds--;
      document.getElementById("countdown").textContent = seconds;

      if (seconds <= 0) {
        clearInterval(countdown);
        redirectToHome();
      }
    }, 1000);

    // ===== Logs =====
    console.log("[ERROR] Página de erro carregada");
    console.log("[ERROR] Você tentou acessar um recurso proibido");
    console.log("[ERROR] Redirecionando em 5 segundos...");
  </script>

</body>

</html>
